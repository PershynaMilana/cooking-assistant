server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from the Server response header.
    server_tokens off;

    # Prevent clickjacking and MIME-type sniffing.
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Serve gzip-compressed files when available (Vite outputs .gz alongside assets).
    gzip_static on;

    # Vite asset filenames are content-hashed, so cache them aggressively.
    location ~* \.(?:js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown paths hand off to index.html so React Router handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
