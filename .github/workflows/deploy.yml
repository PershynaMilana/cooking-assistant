name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # OIDC federated credential for Azure login
  contents: read
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cooking-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/cooking-frontend

jobs:
  build-backend:
    name: Build & push backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=https://${{ vars.API_DOMAIN }}

  deploy:
    name: Migrate & deploy to Azure
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run database migrations
        env:
          BACKEND_TAG: ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}
        run: |
          # point the migration Job at the freshly built image before starting it
          az containerapp job update \
            --name "${{ vars.MIGRATION_JOB }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "$BACKEND_TAG"

          EXEC=$(az containerapp job start \
            --name "${{ vars.MIGRATION_JOB }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --query name -o tsv)

          echo "Waiting for migration execution: $EXEC"
          for _ in $(seq 1 60); do
            STATUS=$(az containerapp job execution show \
              --name "${{ vars.MIGRATION_JOB }}" \
              --resource-group "${{ vars.AZURE_RG }}" \
              --job-execution-name "$EXEC" \
              --query properties.status -o tsv)
            echo "  status: $STATUS"
            [ "$STATUS" = "Succeeded" ] && break
            [ "$STATUS" = "Failed"    ] && { echo "Migration job failed"; exit 1; }
            sleep 5
          done
          [ "$STATUS" != "Succeeded" ] && { echo "Migration job timed out after 5 min"; exit 1; }

      - name: Update backend container app
        run: |
          az containerapp update \
            --name "${{ vars.BACKEND_APP }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}"

      - name: Update frontend container app
        run: |
          az containerapp update \
            --name "${{ vars.FRONTEND_APP }}" \
            --resource-group "${{ vars.AZURE_RG }}" \
            --image "${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}"
