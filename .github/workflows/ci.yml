name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: package-lock.json
          install: npm ci --ignore-scripts
      - name: Check backend formatting
        run: npm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json
          install: npm --prefix backend ci
      - name: Lint backend
        run: npm --prefix backend run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json
          install: npm --prefix backend ci
      - name: Test backend with coverage
        run: npm --prefix backend run test:coverage

  # sonarcloud job to be added later (needs a SonarCloud project + SONAR_TOKEN secret)
