name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# the gate job reads the head commit message (with the PR title as a fallback)
# and decides whether to skip the heavy jobs - working the same on push and PR.
# pull_request events carry no head_commit, so the gate checks out the PR head
# sha and reads its message directly, making [skip-checks] in the commit message
# authoritative everywhere (no need to put it in the PR title). ci-success still
# runs and passes (skipped != failed), so a PR can merge. locally, SKIP_CHECKS=1
# stamps the marker onto the commit subject (see .husky/prepare-commit-msg).
jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: decide
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          MESSAGE="$(git log -1 --pretty=%B)"
          if printf '%s %s' "$MESSAGE" "$PR_TITLE" | grep -qF '[skip-checks]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: package-lock.json
          install: npm ci --ignore-scripts
      - name: Check formatting
        run: npm run format:check

  lint-backend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json
          install: npm --prefix backend ci
      - name: Lint backend
        run: npm --prefix backend run lint

  typecheck-backend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json
          install: npm --prefix backend ci
      - name: Typecheck backend
        run: npm --prefix backend run typecheck

  sonarjs-backend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json
          install: npm --prefix backend ci
      - name: Run backend SonarJS lint
        run: npm --prefix backend run lint:sonarjs

  test-backend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: backend/package-lock.json
          install: npm --prefix backend ci
      - name: Test backend with coverage
        run: npm --prefix backend run test:coverage

  lint-frontend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json
          install: npm --prefix frontend ci
      - name: Lint frontend
        run: npm --prefix frontend run lint

  typecheck-frontend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json
          install: npm --prefix frontend ci
      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck

  sonarjs-frontend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json
          install: npm --prefix frontend ci
      - name: Run frontend SonarJS lint
        run: npm --prefix frontend run lint:sonarjs

  build-frontend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json
          install: npm --prefix frontend ci
      - name: Build frontend
        run: npm --prefix frontend run build

  stylelint-frontend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json
          install: npm --prefix frontend ci
      - name: Run frontend Stylelint
        run: npm --prefix frontend run stylelint

  test-frontend:
    needs: gate
    if: ${{ needs.gate.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-dependency-path: frontend/package-lock.json
          install: npm --prefix frontend ci
      - name: Test frontend with coverage
        run: npm --prefix frontend run test:coverage

  ci-success:
    name: ci-success
    if: always()
    needs: [gate, format, lint-backend, lint-frontend, typecheck-backend, typecheck-frontend, sonarjs-backend, sonarjs-frontend, test-backend, build-frontend, stylelint-frontend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
